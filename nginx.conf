events {}

http {
    # JSON log format matching the AccessLog struct in model/log.go
    log_format json_access escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent'
        '}';

    # Write JSON logs to the shared volume path
    access_log /var/log/nginx/hng-access.log json_access;

    # Disable default error log noise
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        listen [::]:80;

        location / {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Health check endpoint
        location /health {
            return 200 'healthy';
            add_header Content-Type text/plain;
        }
    }
}
