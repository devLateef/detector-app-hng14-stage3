<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HNG Anomaly Detector Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      padding: 24px;
    }
    h1 { color: #38bdf8; margin-bottom: 4px; font-size: 1.6rem; }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #334155;
    }
    .card .label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; margin-top: 4px; }
    .card .value.alert { color: #f87171; }
    .card .value.ok { color: #4ade80; }
    .section { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #334155; }
    .section h2 { color: #38bdf8; font-size: 1rem; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; color: #64748b; font-weight: 600; padding: 6px 8px; border-bottom: 1px solid #334155; }
    td { padding: 6px 8px; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #0f172a; }
    .banned-ip { color: #f87171; font-family: monospace; }
    .top-ip { color: #a78bfa; font-family: monospace; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .footer { color: #475569; font-size: 0.75rem; margin-top: 16px; }
    .no-data { color: #475569; font-style: italic; padding: 8px; }
  </style>
</head>
<body>
  <h1><span class="status-dot"></span>HNG Anomaly Detector</h1>
  <p class="subtitle">Live metrics dashboard — refreshes every 3 seconds</p>

  <div class="grid">
    <div class="card">
      <div class="label">Global Req/s (60s window)</div>
      <div class="value" id="global-rate">—</div>
    </div>
    <div class="card">
      <div class="label">Effective Mean</div>
      <div class="value" id="mean">—</div>
    </div>
    <div class="card">
      <div class="label">Std Dev</div>
      <div class="value" id="stddev">—</div>
    </div>
    <div class="card">
      <div class="label">Banned IPs</div>
      <div class="value alert" id="banned-count">—</div>
    </div>
    <div class="card">
      <div class="label">CPU Goroutines</div>
      <div class="value" id="goroutines">—</div>
    </div>
    <div class="card">
      <div class="label">Memory Usage</div>
      <div class="value" id="memory">—</div>
    </div>
    <div class="card">
      <div class="label">Uptime</div>
      <div class="value ok" id="uptime">—</div>
    </div>
  </div>

  <div class="section">
    <h2>Banned IPs</h2>
    <div id="banned-list"><p class="no-data">No banned IPs</p></div>
  </div>

  <div class="section">
    <h2>Top 10 Source IPs (last 60s)</h2>
    <div id="top-ips"><p class="no-data">No traffic yet</p></div>
  </div>

  <p class="footer" id="last-updated">Last updated: —</p>

  <script>
    function formatUptime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return `${h}h ${m}m ${s}s`;
    }

    function refresh() {
      fetch('/metrics')
        .then(res => res.json())
        .then(data => {
          document.getElementById('global-rate').textContent =
            data.global_rate !== undefined ? data.global_rate : '0';

          document.getElementById('mean').textContent =
            data.baseline_mean !== undefined ? data.baseline_mean.toFixed(2) : '0.00';

          document.getElementById('stddev').textContent =
            data.baseline_stddev !== undefined ? data.baseline_stddev.toFixed(2) : '0.00';

          const bannedIPs = data.banned_ips || [];
          document.getElementById('banned-count').textContent = bannedIPs.length;

          document.getElementById('goroutines').textContent =
            data.goroutines !== undefined ? data.goroutines : '—';

          document.getElementById('memory').textContent =
            data.memory_mb !== undefined ? data.memory_mb.toFixed(1) + ' MB' : '—';

          document.getElementById('uptime').textContent =
            data.uptime_seconds !== undefined ? formatUptime(data.uptime_seconds) : '—';

          // Banned IPs table
          const bannedDiv = document.getElementById('banned-list');
          if (bannedIPs.length === 0) {
            bannedDiv.innerHTML = '<p class="no-data">No banned IPs</p>';
          } else {
            let html = '<table><thead><tr><th>IP Address</th><th>Banned At</th></tr></thead><tbody>';
            bannedIPs.forEach(entry => {
              html += `<tr><td class="banned-ip">${entry.ip || entry}</td><td>${entry.banned_at || '—'}</td></tr>`;
            });
            html += '</tbody></table>';
            bannedDiv.innerHTML = html;
          }

          // Top IPs table
          const topIPs = data.top_ips || [];
          const topDiv = document.getElementById('top-ips');
          if (topIPs.length === 0) {
            topDiv.innerHTML = '<p class="no-data">No traffic yet</p>';
          } else {
            let html = '<table><thead><tr><th>#</th><th>IP Address</th><th>Requests (60s)</th></tr></thead><tbody>';
            topIPs.forEach((entry, i) => {
              html += `<tr><td>${i + 1}</td><td class="top-ip">${entry.ip}</td><td>${entry.count}</td></tr>`;
            });
            html += '</tbody></table>';
            topDiv.innerHTML = html;
          }

          document.getElementById('last-updated').textContent =
            'Last updated: ' + new Date().toLocaleTimeString();
        })
        .catch(err => {
          console.error('Failed to fetch metrics:', err);
        });
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
