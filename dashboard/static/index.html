<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="3">
  <style>
    body { background:#0f172a; color:white; font-family:sans-serif; }
  </style>
</head>
<body>
<h1>HNG Dashboard</h1>
<pre id="data"></pre>

<script>
fetch('/metrics')
.then(res => res.json())
.then(data => {
  document.getElementById('data').innerText = JSON.stringify(data, null, 2);
});
</script>

</body>
</html>
