services:

  # Nextcloud — pre-built image, do not modify
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
      # Mount nginx logs read-only (Nextcloud may need to read them)
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost

  # Nginx reverse proxy — writes JSON access logs to shared volume
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    volumes:
      # Named volume — nginx writes logs here
      - HNG-nginx-logs:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # Anomaly detector daemon
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: detector
    restart: unless-stopped
    depends_on:
      - nginx
    cap_add:
      - NET_ADMIN
    network_mode: host
    env_file:
      - .env
    volumes:
      # Read nginx logs from shared volume
      - HNG-nginx-logs:/var/log/nginx:ro
      # Mount config for live threshold updates without rebuild
      - ./detector/config.yaml:/app/config.yaml:ro

volumes:
  nextcloud_data:
  HNG-nginx-logs:
    name: HNG-nginx-logs   # Explicit name as required by the task
