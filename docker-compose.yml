services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Shared volume so detector-app can read nginx logs
      - nginx_logs:/var/log/nginx
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  detector-app:
    build: .
    container_name: detector-app
    restart: unless-stopped
    depends_on:
      - nginx

    # Required to run iptables inside the container
    cap_add:
      - NET_ADMIN
    network_mode: host

    environment:
      - SLACK_WEBHOOK=${SLACK_WEBHOOK}

    volumes:
      # Same shared volume — detector reads what nginx writes
      - nginx_logs:/var/log/nginx:ro
      # Mount config so you can update thresholds without rebuilding
      - ./config.yaml:/app/config.yaml:ro

volumes:
  nginx_logs:
